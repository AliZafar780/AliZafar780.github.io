<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#0a0a0a">
    <title>404 - Page Not Found | Ali Zafar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #00ff88;
            --accent-hover: #00cc6a;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 136, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .error-container {
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
        }

        .error-title {
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }

        .btn-custom {
            background-color: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 30px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-custom:hover {
            background-color: var(--accent);
            color: var(--bg-primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }

        .glitch-line {
            width: 60px;
            height: 2px;
            background-color: var(--accent);
            margin: 1.5rem auto;
            opacity: 0.5;
        }

        .footer-text {
            position: fixed;
            bottom: 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="glitch-line"></div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist, has been moved, or never existed in the first place.<br>
            Even the best reconnaissance doesn't always find everything.
        </p>
        <a href="/" class="btn-custom" aria-label="Return to homepage">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
    <p class="footer-text">&copy; 2026 Ali Zafar</p>
    <script>
        // Matrix-style flicker on the 404
        setInterval(() => {
            const code = document.querySelector('.error-code');
            code.style.opacity = 0.7 + Math.random() * 0.3;
        }, 200);
    </script>
</body>
</html>
